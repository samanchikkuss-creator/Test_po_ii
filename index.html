<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тесты по Базам Данных | Самандар</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --success: #10b981;
            --success-dark: #059669;
            --error: #ef4444;
            --error-dark: #dc2626;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --surface-light: #ffffff;
            --surface-dark: #1e293b;
            --text-light: #1e293b;
            --text-dark: #f1f5f9;
            --text-secondary-light: #64748b;
            --text-secondary-dark: #cbd5e1;
            --border-light: #e2e8f0;
            --border-dark: #334155;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            transition: all 0.3s ease;
            min-height: 100vh;
            padding: 20px;
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* Кнопка темы */
        .theme-toggle {
            background: var(--surface-light);
            border: 2px solid var(--border-light);
            border-radius: 50px;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            color: var(--text-light);
        }

        body.dark .theme-toggle {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        /* Поиск */
        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 14px 24px;
            border: 2px solid var(--border-light);
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
            background: var(--surface-light);
            color: var(--text-light);
        }

        body.dark .search-input {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .search-input::placeholder {
            color: var(--text-secondary-light);
        }

        body.dark .search-input::placeholder {
            color: var(--text-secondary-dark);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Карточки этапов */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stage-card {
            background: var(--surface-light);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--border-light);
            color: var(--text-light);
        }

        body.dark .stage-card {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .stage-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        /* Статистика */
        .stats-panel {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Кнопки */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--error), var(--error-dark));
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #ea580c);
            color: white;
        }

        /* ОПЦИИ ВОПРОСОВ — ИСПРАВЛЕННЫЕ ДЛЯ ТЁМНОЙ ТЕМЫ */
        .option {
            padding: 16px 20px;
            border: 2px solid var(--border-light);
            border-radius: 16px;
            cursor: pointer;
            background: var(--surface-light);
            color: var(--text-light);
            width: 100%;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            text-align: left;
            font-size: 1em;
        }

        body.dark .option {
            background: var(--surface-dark);
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .option:hover:not(:disabled) {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        /* Правильный ответ */
        .option.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* Неправильный ответ */
        .option.wrong {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        /* ВЫДЕЛЕНИЕ ПРИ КЛИКЕ (видно в обеих темах) */
        .option:active:not(:disabled) {
            transform: scale(0.98);
        }

        /* ТЁМНАЯ ТЕМА — яркая подсветка нажатого ответа */
        body.dark .option:active:not(:disabled) {
            border-color: #ffaa00;
            box-shadow: 0 0 0 3px #ffaa00;
            background: var(--primary-dark);
        }

        /* УСИЛЕННАЯ ВИДИМОСТЬ ПРАВИЛЬНЫХ/НЕПРАВИЛЬНЫХ ОТВЕТОВ В ТЁМНОЙ ТЕМЕ */
        body.dark .option.correct {
            background: #0d9488;
            border: 2px solid #2dd4bf;
            box-shadow: 0 0 0 1px #2dd4bf;
            font-weight: bold;
        }

        body.dark .option.wrong {
            background: #b91c1c;
            border: 2px solid #f87171;
            box-shadow: 0 0 0 1px #f87171;
        }

        .option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Навигация по вопросам */
        .numbers-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 140px;
            overflow-y: auto;
            padding: 15px;
            background: var(--surface-light);
            border-radius: 16px;
            border: 2px solid var(--border-light);
        }

        body.dark .numbers-nav {
            background: var(--surface-dark);
            border-color: var(--border-dark);
        }

        .num-item {
            min-width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: var(--surface-light);
            color: var(--text-light);
        }

        body.dark .num-item {
            background: var(--surface-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
        }

        .num-item:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .num-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .num-item.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .num-item.wrong {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        /* Прогресс */
        .progress-section {
            margin: 20px 0;
        }

        .progress-bar {
            height: 12px;
            background: var(--border-light);
            border-radius: 20px;
            overflow: hidden;
        }

        body.dark .progress-bar {
            background: var(--border-dark);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        /* Таймер */
        .timer {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Текст вопроса */
        .question-text {
            background: var(--surface-light);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-light);
        }

        body.dark .question-text {
            background: var(--surface-dark);
            color: var(--text-dark);
        }

        /* Боковая панель */
        .side-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 400px;
            max-width: 90%;
            height: 100%;
            background: var(--surface-light);
            box-shadow: -5px 0 25px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            z-index: 1000;
            padding: 80px 20px 20px;
            overflow-y: auto;
            color: var(--text-light);
        }

        body.dark .side-panel {
            background: var(--surface-dark);
            color: var(--text-dark);
        }

        .side-panel.active {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            border-radius: 12px;
            background: var(--surface-light);
            color: var(--text-light);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 1100;
            animation: fadeIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        body.dark .toast {
            background: var(--surface-dark);
            color: var(--text-dark);
        }

        .hidden {
            display: none;
        }

        .grade-badge {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .stats-box {
            background: var(--surface-light);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
        }

        body.dark .stats-box {
            background: var(--surface-dark);
        }

        /* Адаптив */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .option {
                padding: 12px 16px;
            }
            
            .num-item {
                min-width: 40px;
                height: 40px;
                font-size: 0.85rem;
            }

            .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--border-light);
            border-radius: 10px;
        }

        body.dark ::-webkit-scrollbar-track {
            background: var(--border-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-database"></i>
                Тесты по Базам Данных
                <i class="fas fa-graduation-cap"></i>
            </h1>
            <button class="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
                <span>Тёмная тема</span>
            </button>
        </div>

        <div id="menu-screen">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск вопросов..." onkeyup="searchQuestions()">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="stats-panel">
                <h3><i class="fas fa-chart-line"></i> Ваша статистика</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalTests">0</div>
                        <div class="stat-label">Пройдено тестов</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgScore">0%</div>
                        <div class="stat-label">Средний результат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalErrors">0</div>
                        <div class="stat-label">Ошибок всего</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="bestScore">0%</div>
                        <div class="stat-label">Лучший результат</div>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="startErrorsOnly()">
                    <i class="fas fa-bug"></i> Только ошибки
                </button>
                <button class="btn btn-primary" onclick="startRandom30()">
                    <i class="fas fa-random"></i> Случайные 30
                </button>
                <button class="btn btn-primary" onclick="startRandom50()">
                    <i class="fas fa-random"></i> Случайные 50
                </button>
                <button class="btn btn-primary" onclick="startRandom100()">
                    <i class="fas fa-random"></i> Случайные 100
                </button>
                <button class="btn btn-warning" onclick="toggleSidePanel()">
                    <i class="fas fa-history"></i> История
                </button>
            </div>

            <div class="menu-grid" id="stages-container"></div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                <div class="timer" id="timer">60:00</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="showHint()">
                        <i class="fas fa-lightbulb"></i> Подсказка
                    </button>
                    <button class="btn btn-danger" onclick="confirmFinish()">
                        <i class="fas fa-check-circle"></i> Завершить
                    </button>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div id="progress-text" style="text-align: center; margin-top: 8px;"></div>
            </div>

            <div id="question-counter" style="margin-bottom: 15px;"></div>

            <div class="numbers-nav" id="numbers-nav"></div>

            <div class="question-text" id="question-text">
                <div id="q-text"></div>
            </div>

            <div id="options-box"></div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button id="prev-btn" class="btn" style="flex: 1; background: var(--border-light);" onclick="prevQuestion()">
                    <i class="fas fa-arrow-left"></i> Назад
                </button>
                <button id="next-btn" class="btn btn-primary" style="flex: 1;" onclick="nextQuestion()">
                    Далее <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden" style="text-align: center;">
            <div class="grade-badge" id="grade-display"></div>
            <div class="stats-box">
                <p id="stats-display" style="font-size: 1.5rem; font-weight: 600; margin-bottom: 15px;"></p>
                <p id="details-display"></p>
            </div>
            <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="location.reload()">
                    <i class="fas fa-home"></i> В меню
                </button>
                <button class="btn" style="background: var(--success); color: white;" onclick="shareResult()">
                    <i class="fas fa-share-alt"></i> Поделиться
                </button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidePanel()"></div>
    <div class="side-panel" id="side-panel">
        <button onclick="toggleSidePanel()" style="float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: inherit;">✕</button>
        <h2><i class="fas fa-chart-simple"></i> История результатов</h2>
        <div id="results-history" style="max-height: 300px; overflow-y: auto; margin: 20px 0;"></div>
        <button class="btn btn-danger" onclick="clearResultsOnly()" style="width: 100%;">
            <i class="fas fa-trash"></i> Очистить историю
        </button>
        
        <hr style="margin: 20px 0; border-color: var(--border-light);">
        
        <h2><i class="fas fa-exclamation-triangle"></i> Ошибки</h2>
        <div id="errors-history" style="max-height: 300px; overflow-y: auto; margin: 20px 0;"></div>
        <button class="btn btn-danger" onclick="clearErrorsOnly()" style="width: 100%;">
            <i class="fas fa-trash"></i> Очистить ошибки
        </button>
    </div>

    <script>
        // ВСЕ ВОПРОСЫ (226 штук)
        const allQuestionsRaw = [
            ["Что такое анализ предложений в технологии обработки естественного языка?", "Процесс изучения грамматической, синтаксической и семантической структуры предложения.", "Метод обнаружения звукового сигнала с помощью компьютера", "Процесс разделения текста на части", "Разделение слов в предложении"],
            ["Как представлена логическая модель?", "Факты, отношения и выводы", "Связи между данными", "Правила вывода", "Извлечение знаний"],
            ["В какой области используется теорема Байеса?", "Решение неопределенности в теории вероятностей", "Механизм вывода заключений", "Анализ данных", "Создание отраслевых знаний"],
            ["Какие виды знаний существуют?", "Декларативные, процессуальные, эвристические, семантические, метазнания", "Декларативные, процессуальные, эвристические, структурные, мета-знания", "Декларативные, продукционные, эвристические, структурные, мета-знания", "Декларативный, процедурный, фрейм, структурный, мета-знание"],
            ["Какие методы используются для извлечения знаний?", "Машинное обучение, обработка естественного языка и анализ других данных", "Только статистический и математический анализ", "Сбор данных и работа только с цифровыми данными", "Только изучение пользователей через опросы"],
            ["Как работает Продукционная модель", "Использует набор правил", "Связи между данными", "Выражает отношения между понятиями", "Только делает выводы"],
            ["Какую задачу выполняет самый простой перцептрон?", "Бинарная классификация", "Программирование игр", "Непрерывное вычисление", "Деление векторов"],
            ["Какие операции выполняются над входными значениями нейрона?", "Математические комбинации", "Только сумма чисел", "Только умножение", "измерение масштаба ошибки"],
            ["На каком алгоритме основан искусственный нейрон?", "Математические комбинации и функции", "Сортировка данных", "Линейное измерение", "Векторный анализ"],

        const QUESTIONS_PER_STAGE = 30;
        const TOTAL_QUESTIONS = allQuestionsRaw.length;

        let currentQuestions = [];
        let currentIdx = 0;
        let timerInterval;
        let currentStageName = '';

        // Тема
        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const btnSpan = document.querySelector('.theme-toggle span');
            const btnIcon = document.querySelector('.theme-toggle i');
            if (isDark) {
                btnSpan.textContent = 'Светлая тема';
                btnIcon.className = 'fas fa-sun';
            } else {
                btnSpan.textContent = 'Тёмная тема';
                btnIcon.className = 'fas fa-moon';
            }
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark');
                document.querySelector('.theme-toggle span').textContent = 'Светлая тема';
                document.querySelector('.theme-toggle i').className = 'fas fa-sun';
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showHint() {
            if (currentQuestions[currentIdx]) {
                const q = currentQuestions[currentIdx];
                const hint = `💡 Правильный ответ начинается с: "${q.options[q.correctIdx].substring(0, 30)}..."`;
                showToast(hint, 'info');
            }
        }

        function shareResult() {
            const stats = document.getElementById('stats-display').innerText;
            navigator.clipboard.writeText(`Мой результат по БД: ${stats}`);
            showToast('Результат скопирован! 📋');
        }

        function updateStats() {
            const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            
            document.getElementById('totalTests').textContent = results.length;
            document.getElementById('totalErrors').textContent = errors.length;
            
            if (results.length > 0) {
                const avg = results.reduce((a, b) => a + b.score, 0) / results.length;
                document.getElementById('avgScore').textContent = Math.round(avg) + '%';
                const best = Math.max(...results.map(r => r.score));
                document.getElementById('bestScore').textContent = best + '%';
            }
        }

        function searchQuestions() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('searchResults');
            if (!term) {
                resultsDiv.innerHTML = '';
                return;
            }
            
            const results = [];
            for (let i = 0; i < allQuestionsRaw.length; i++) {
                if (allQuestionsRaw[i][0].toLowerCase().includes(term)) {
                    results.push({ index: i, question: allQuestionsRaw[i][0] });
                }
            }
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 20px; text-align: center;">Ничего не найдено 🔍</div>';
                return;
            }
            
            resultsDiv.innerHTML = results.slice(0, 20).map(r => `
                <div class="stage-card" style="margin-bottom: 10px; cursor: pointer;" onclick="startSingleQuestion(${r.index})">
                    <strong>Вопрос ${r.index + 1}</strong>
                    <p style="margin-top: 8px;">${r.question.substring(0, 100)}${r.question.length > 100 ? '...' : ''}</p>
                </div>
            `).join('');
        }

        function startSingleQuestion(idx) {
            startTest([allQuestionsRaw[idx]], 'Один вопрос');
            setTimeout(() => {
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchInput').value = '';
            }, 100);
        }

        function startErrorsOnly() {
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            if (errors.length === 0) {
                showToast('Нет вопросов с ошибками! 🎉', 'info');
                return;
            }
            const errorQuestions = errors.map(e => allQuestionsRaw.find(q => q[0] === e.q)).filter(q => q);
            if (errorQuestions.length === 0) return;
            startTest(errorQuestions, 'Только ошибки');
        }

        function startRandom30() { startRandomN(30); }
        function startRandom50() { startRandomN(50); }
        function startRandom100() { startRandomN(100); }
        
        function startRandomN(n) {
            const shuffled = [...allQuestionsRaw].sort(() => Math.random() - 0.5);
            startTest(shuffled.slice(0, Math.min(n, TOTAL_QUESTIONS)), `Случайные ${n}`);
        }

        function startTest(qs, name) {
            currentQuestions = qs.map((q, idx) => {
                const correct = q[1];
                const opts = [...q.slice(1)].sort(() => Math.random() - 0.5);
                const globalIdx = allQuestionsRaw.findIndex(x => x[0] === q[0]);
                return { q: q[0], options: opts, correctIdx: opts.indexOf(correct), user: null, globalIndex: globalIdx };
            });
            currentStageName = name;
            currentIdx = 0;
            
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            renderNavigation();
            renderQuestion();
            startTimer();
        }

        function startTimer() {
            let time = 3600;
            if (timerInterval) clearInterval(timerInterval);
            const update = () => {
                time--;
                const m = Math.floor(time / 60);
                const s = time % 60;
                document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
                if (time <= 0) { clearInterval(timerInterval); showResult(); }
            };
            update();
            timerInterval = setInterval(update, 1000);
        }

        function renderNavigation() {
            const nav = document.getElementById('numbers-nav');
            nav.innerHTML = '';
            for (let i = 0; i < currentQuestions.length; i++) {
                const btn = document.createElement('div');
                btn.className = 'num-item';
                btn.textContent = i + 1;
                btn.onclick = () => { currentIdx = i; renderQuestion(); updateNavActive(); };
                nav.appendChild(btn);
            }
            updateNavActive();
        }

        function updateNavActive() {
            document.querySelectorAll('.num-item').forEach((el, i) => {
                el.classList.remove('active');
                if (i === currentIdx) el.classList.add('active');
                if (currentQuestions[i].user !== null) {
                    el.classList.remove('correct', 'wrong');
                    el.classList.add(currentQuestions[i].user === currentQuestions[i].correctIdx ? 'correct' : 'wrong');
                }
            });
        }

        function renderQuestion() {
            const q = currentQuestions[currentIdx];
            const progress = ((currentIdx + 1) / currentQuestions.length * 100).toFixed(1);
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `Прогресс: ${currentIdx + 1}/${currentQuestions.length} (${progress}%)`;
            document.getElementById('question-counter').innerHTML = `<i class="fas fa-question-circle"></i> Вопрос ${currentIdx + 1} из ${currentQuestions.length}`;
            
            document.getElementById('q-text').innerHTML = `<span style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px;">Вопрос ${q.globalIndex + 1}</span><br>${q.q}`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerHTML = `<strong>${String.fromCharCode(65 + i)})</strong> ${opt}`;
                if (q.user !== null) {
                    btn.disabled = true;
                    if (i === q.correctIdx) btn.classList.add('correct');
                    if (i === q.user && i !== q.correctIdx) btn.classList.add('wrong');
                } else {
                    btn.onclick = () => {
                        q.user = i;
                        const isCorrect = i === q.correctIdx;
                        if (isCorrect) {
                            showToast('✅ Правильно!', 'success');
                        } else {
                            showToast(`❌ Неправильно! Правильный ответ: ${q.options[q.correctIdx]}`, 'info');
                        }
                        renderQuestion();
                        updateNavActive();
                    };
                }
                box.appendChild(btn);
            });
            
            updateNavActive();
        }

        function prevQuestion() {
            if (currentIdx > 0) { currentIdx--; renderQuestion(); }
        }

        function nextQuestion() {
            if (currentIdx < currentQuestions.length - 1) { currentIdx++; renderQuestion(); }
            else { showResult(); }
        }

        function confirmFinish() {
            if (confirm('Завершить тест?')) showResult();
        }

        function showResult() {
            clearInterval(timerInterval);
            const correct = currentQuestions.filter(q => q.user === q.correctIdx).length;
            const percent = Math.round((correct / currentQuestions.length) * 100);
            let grade, color;
            if (percent >= 85) { grade = 5; color = '#10b981'; }
            else if (percent >= 70) { grade = 4; color = '#3b82f6'; }
            else if (percent >= 60) { grade = 3; color = '#f59e0b'; }
            else { grade = 2; color = '#ef4444'; }
            
            document.getElementById('grade-display').textContent = grade;
            document.getElementById('grade-display').style.color = color;
            document.getElementById('stats-display').innerHTML = `${correct}/${currentQuestions.length} (${percent}%)`;
            document.getElementById('details-display').innerHTML = `✅ Правильных: ${correct}<br>❌ Ошибок: ${currentQuestions.filter(q => q.user !== null && q.user !== q.correctIdx).length}<br>⏸ Без ответа: ${currentQuestions.filter(q => q.user === null).length}`;
            
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
            results.unshift({ date: new Date().toLocaleString(), score: percent, correct, total: currentQuestions.length, grade });
            localStorage.setItem('tr_results', JSON.stringify(results.slice(0, 50)));
            
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            currentQuestions.filter(q => q.user !== q.correctIdx).forEach(e => {
                if (!errors.some(err => err.q === e.q)) {
                    errors.unshift({ q: e.q, a: e.options[e.correctIdx], date: new Date().toLocaleString() });
                }
            });
            localStorage.setItem('tr_errors', JSON.stringify(errors.slice(0, 100)));
            
            updateStats();
            renderSidebar();
        }

        function renderSidebar() {
            const results = JSON.parse(localStorage.getItem('tr_results') || '[]');
            const errors = JSON.parse(localStorage.getItem('tr_errors') || '[]');
            
            const rDiv = document.getElementById('results-history');
            rDiv.innerHTML = results.slice(0, 15).map(r => `
                <div style="padding: 12px; border-bottom: 1px solid var(--border-light);">
                    <div><strong>${r.date}</strong></div>
                    <div>Оценка: ${r.grade} (${r.score}%)</div>
                    <div>${r.correct}/${r.total} правильных</div>
                </div>
            `).join('');
            if (results.length === 0) rDiv.innerHTML = '<p style="text-align: center;">Нет записей</p>';
            
            const eDiv = document.getElementById('errors-history');
            eDiv.innerHTML = errors.slice(0, 15).map(e => `
                <div style="padding: 12px; border-bottom: 1px solid var(--border-light); margin-bottom: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 12px;">
                    <div><strong>❌ Вопрос:</strong> ${e.q.substring(0, 80)}${e.q.length > 80 ? '...' : ''}</div>
                    <div><strong>✅ Ответ:</strong> ${e.a}</div>
                    <small>${e.date}</small>
                </div>
            `).join('');
            if (errors.length === 0) eDiv.innerHTML = '<p style="text-align: center;">Ошибок нет! 🎉</p>';
        }

        function clearResultsOnly() {
            if (confirm('Очистить историю результатов?')) {
                localStorage.removeItem('tr_results');
                updateStats();
                renderSidebar();
                showToast('История очищена');
            }
        }

        function clearErrorsOnly() {
            if (confirm('Очистить список ошибок?')) {
                localStorage.removeItem('tr_errors');
                renderSidebar();
                showToast('Ошибки очищены');
            }
        }

        function toggleSidePanel() {
            document.getElementById('side-panel').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            if (document.getElementById('side-panel').classList.contains('active')) renderSidebar();
        }

        function initMenu() {
            const container = document.getElementById('stages-container');
            const stages = Math.ceil(TOTAL_QUESTIONS / QUESTIONS_PER_STAGE);
            for (let i = 0; i < stages; i++) {
                const start = i * QUESTIONS_PER_STAGE;
                const end = Math.min(start + QUESTIONS_PER_STAGE, TOTAL_QUESTIONS);
                const card = document.createElement('div');
                card.className = 'stage-card';
                card.innerHTML = `
                    <i class="fas fa-layer-group" style="font-size: 32px; color: var(--primary); margin-bottom: 10px;"></i>
                    <h3>Этап ${i + 1}</h3>
                    <p>Вопросы ${start + 1} - ${end}</p>
                    <div style="font-size: 0.85rem; opacity: 0.7;">${end - start} вопросов</div>
                `;
                card.onclick = () => startTest(allQuestionsRaw.slice(start, end), `Этап ${i + 1}`);
                container.appendChild(card);
            }
            
            const allCard = document.createElement('div');
            allCard.className = 'stage-card';
            allCard.innerHTML = `
                <i class="fas fa-database" style="font-size: 32px; color: var(--success); margin-bottom: 10px;"></i>
                <h3>Все вопросы</h3>
                <p>1 - ${TOTAL_QUESTIONS}</p>
                <div style="font-size: 0.85rem; opacity: 0.7;">${TOTAL_QUESTIONS} вопросов</div>
            `;
            allCard.onclick = () => startTest([...allQuestionsRaw], 'Все вопросы');
            container.appendChild(allCard);
            
            updateStats();
            renderSidebar();
        }

        loadTheme();
        initMenu();
    </script>
</body>
</html>
